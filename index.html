<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PayPerToe</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7fbff;
      color: #1f2937;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    .tagline {
      font-size: 1.2rem;
      opacity: 0.85;
      margin-bottom: 30px;
      max-width: 420px;
      line-height: 1.4;
    }

    /* 🔴 Warning flair */
    .warning {
      color: #e63946;
      font-weight: bold;
      letter-spacing: 0.5px;
      text-shadow: 0 0 6px rgba(230, 57, 70, 0.4);
      animation: pulseWarning 1.5s infinite;
    }

    @keyframes pulseWarning {
      0% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(1.05); }
      100% { opacity: 1; transform: scale(1); }
    }

    img {
      width: 280px;
      border-radius: 16px;
      margin-bottom: 30px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    /* 🔥 Button styling */
    .button {
      background: linear-gradient(135deg, #7bbde8, #f7a8c4);
      color: white;
      padding: 14px 28px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: bold;
      font-size: 1rem;
      transition: all 0.2s ease;
      box-shadow: 0 6px 15px rgba(0,0,0,0.15);
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .button:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 12px 25px rgba(0,0,0,0.25);
      cursor: pointer;
    }

    /* 👀 hover effect */
    .eyes {
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .button:hover .eyes {
      opacity: 1;
    }
  </style>
</head>

<body>

  <h1>PayPerToe</h1>

  <p class="tagline">
    …yeah, it’s as bad as it sounds.<br>
    Sure… go ahead and click.<br>
    <span class="warning">But you were warned.</span>
  </p>

  <img src="images/bft.png" alt="Painted toenails">

  <a href="jrhtoes.html" class="button">
    <span>Full Send</span>
    <span class="eyes">👀</span>
  </a>

</body>
</html>
